<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到mmddskq的领地</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        .container {
            text-align: center;
            position: relative;
        }

        .welcome-text {
            font-size: 4rem;
            background: linear-gradient(45deg, #7f00ff, #00ffff, #ff00ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: gradient 5s ease infinite;
            position: relative;
            margin-bottom: 2rem;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .cyber-line {
            width: 200px;
            height: 4px;
            background: linear-gradient(90deg, transparent, #7f00ff, transparent);
            margin: 20px auto;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 1s ease forwards;
        }

        .social-link {
            display: inline-block;
            color: #00ffff;
            text-decoration: none;
            font-size: 1.2rem;
            margin: 15px;
            padding: 10px 20px;
            border: 2px solid #7f00ff;
            border-radius: 5px;
            transition: all 0.3s ease;
            opacity: 0;
            animation: fadeIn 1s ease 0.5s forwards;
        }

        .social-link:hover {
            background: #7f00ff55;
            transform: translateY(-3px);
            box-shadow: 0 0 15px #7f00ff;
        }

        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #7f00ff22 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <h1 class="welcome-text">WELCOME TO MMDDSKQ</h1>
        <div class="cyber-line"></div>
        <p class="subtitle">Developer | Creator | Innovator</p>
        <a href="https://github.com/mmddskq" target="_blank" class="social-link">
            🌟 Visit My GitHub
        </a>
    </div>

    <script>
        // 添加随机粒子效果
        document.addEventListener('DOMContentLoaded', () => {
            const colors = ['#7f00ff', '#00ffff', '#ff00ff'];
            const container = document.querySelector('.container');
            
            for(let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.style.position = 'absolute';
                particle.style.width = Math.random() * 3 + 'px';
                particle.style.height = particle.style.width;
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.borderRadius = '50%';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.opacity = '0.3';
                particle.style.animation = `float ${Math.random() * 5 + 5}s infinite`;
                container.appendChild(particle);
            }
        });
    </script>
</body>
</html>
